<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <title>Purple Subaru-Inspired Splash Icon</title>
  <desc>Minimal purple Subaru-inspired sporty sedan icon with hood scoop for .NET MAUI splash screen.</desc>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A56BFF"/>
      <stop offset="100%" stop-color="#6C2BFF"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F1EBFF"/>
      <stop offset="100%" stop-color="#CDBAFF"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="456" height="456" fill="none"/>

  <g transform="translate(26,58)">
    <!-- body -->
    <path d="M72 258
             C84 227, 107 205, 145 194
             L176 185
             C194 157, 231 144, 282 149
             C311 152, 334 164, 352 187
             L372 212
             C388 217, 400 225, 406 237
             C412 248, 413 260, 410 272
             L401 303
             C398 315, 387 324, 375 324
             H341
             C334 324, 327 320, 324 314
             L319 304
             H126
             L121 314
             C118 320, 111 324, 104 324
             H73
             C58 324, 46 312, 46 297
             V280
             C46 269, 55 262, 72 258 Z"
          fill="url(#body)"/>

    <!-- hood scoop -->
    <path d="M176 188
             C191 180, 212 177, 230 180
             C219 186, 208 191, 197 195
             C188 198, 181 196, 176 188 Z"
          fill="#EADFFF" opacity="0.95"/>

    <!-- windows -->
    <path d="M184 181
             C204 159, 236 151, 278 154
             C302 156, 322 166, 337 184
             L353 204
             C357 209, 354 216, 346 216
             H148
             C142 216, 139 208, 143 202
             L154 187
             C163 186, 173 184, 184 181 Z"
          fill="url(#glass)"/>

    <!-- cabin pillars / window splits -->
    <path d="M206 158 L192 216" stroke="#C9B1FF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <path d="M271 154 L281 216" stroke="#C9B1FF" stroke-width="6" stroke-linecap="round" opacity="0.8"/>

    <!-- lower body highlight -->
    <path d="M112 224
             C149 218, 230 215, 310 219
             C340 221, 364 225, 384 234"
          fill="none" stroke="#C99FFF" stroke-width="8" stroke-linecap="round" opacity="0.75"/>

    <!-- front lamp + rear lamp -->
    <path d="M78 266 L105 264" stroke="#F3ECFF" stroke-width="10" stroke-linecap="round"/>
    <path d="M346 254 L378 259" stroke="#F3ECFF" stroke-width="10" stroke-linecap="round"/>

    <!-- grille line -->
    <path d="M95 286 C110 283, 121 282, 132 282" fill="none" stroke="#43206E" stroke-width="6" stroke-linecap="round" opacity="0.65"/>

    <!-- wheels -->
    <circle cx="126" cy="306" r="35" fill="#1D1330"/>
    <circle cx="126" cy="306" r="16" fill="#EDE4FF"/>
    <circle cx="317" cy="306" r="35" fill="#1D1330"/>
    <circle cx="317" cy="306" r="16" fill="#EDE4FF"/>
  </g>
</svg>
